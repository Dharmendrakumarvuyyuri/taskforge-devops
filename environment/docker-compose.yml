version: "3.9"

services:
  redis:
    image: redis:7.2.5-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python run.py
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
